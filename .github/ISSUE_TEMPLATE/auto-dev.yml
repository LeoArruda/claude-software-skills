name: 🤖 Auto-Dev Task
description: Create an automated development task
title: "[Auto-Dev] "
labels: ["auto-dev"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🤖 Auto-Dev task
        Describe your development goal; the bot will run and open a PR.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Clearly describe what you want to achieve
      placeholder: |
        For example:
        - Implement user login with email and password
        - Improve home page load time; target under 2 seconds
        - Refactor UserService to use the repository pattern
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know the task is done?
      placeholder: |
        - [ ] Feature works as expected
        - [ ] Unit tests added
        - [ ] CI passes
    validations:
      required: false

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Technical limits or preferences?
      placeholder: |
        - Use TypeScript
        - Do not add new dependencies
        - Follow existing code style
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - normal
        - high
        - low
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I understand the bot will change code and open a PR
          required: true
        - label: I will review the PR before merging
          required: true
