# ============================================================================
# Auto-Dev Feedback Handler
# ============================================================================
# Handle human review feedback:
#   - /evolve on PRs (continue iteration)
#   - Update memory after PR merge
#   - Record failures after PR close without merge
# ============================================================================

name: 🔄 Auto-Dev Feedback

on:
  # PR comments
  pull_request_review_comment:
    types: [created]

  issue_comment:
    types: [created]

  # PR lifecycle
  pull_request:
    types: [closed]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  # =========================================================================
  # Handle PR comment commands
  # =========================================================================
  handle-pr-command:
    name: 📝 Handle PR Command
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/evolve')
    runs-on: ubuntu-latest

    steps:
      - name: Parse command
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const evolveMatch = comment.match(/^\/evolve\s+(.+)/s);

            if (evolveMatch) {
              const feedback = evolveMatch[1].trim();
              core.setOutput('feedback', feedback);
              core.setOutput('should_continue', 'true');

              // Load PR details
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number
              });

              core.setOutput('branch_name', pr.head.ref);
              core.setOutput('pr_number', pr.number);
            } else {
              core.setOutput('should_continue', 'false');
            }

      - name: Checkout PR branch
        if: steps.parse.outputs.should_continue == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.parse.outputs.branch_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        if: steps.parse.outputs.should_continue == 'true'
        run: |
          git config user.name "Auto-Dev Bot"
          git config user.email "auto-dev-bot@users.noreply.github.com"

      - name: Post acknowledgment
        if: steps.parse.outputs.should_continue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.pr_number }},
              body: `## 🔄 Feedback received; continuing iteration...

            **Updated goal**:
            > ${{ steps.parse.outputs.feedback }}

            ⏳ Running...`
            });

      - name: Install Claude Code
        if: steps.parse.outputs.should_continue == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Continue evolution with feedback
        if: steps.parse.outputs.should_continue == 'true'
        env:
          FEEDBACK: ${{ steps.parse.outputs.feedback }}
        run: |
          # Evolve with feedback
          claude --dangerously-skip-permissions \
                 --max-turns 30 \
                 "/evolve Continue and apply this feedback: $FEEDBACK" 2>&1 | tee execution.log

      - name: Commit and push changes
        if: steps.parse.outputs.should_continue == 'true'
        run: |
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "feat: Iteration based on feedback

          Feedback: $(echo '${{ steps.parse.outputs.feedback }}' | head -1)

          🤖 Generated by Auto-Dev Bot"
            git push origin ${{ steps.parse.outputs.branch_name }}

            echo "CHANGES_MADE=true" >> $GITHUB_ENV
          else
            echo "CHANGES_MADE=false" >> $GITHUB_ENV
          fi

      - name: Post completion
        if: steps.parse.outputs.should_continue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const changesMade = '${{ env.CHANGES_MADE }}' === 'true';

            let message = changesMade
              ? `## ✅ Iteration complete!

            Code updated from feedback; please review again.`
              : `## ⚠️ No new changes

            Feedback was processed but no new code changes were produced.
            Try a more specific instruction.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.parse.outputs.pr_number }},
              body: message
            });

  # =========================================================================
  # After PR merge: record success
  # =========================================================================
  handle-pr-merged:
    name: 📚 Record Success
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, '🤖 auto-dev')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record success to memory
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const date = new Date().toISOString().split('T')[0];
            const slug = pr.title.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .substring(0, 50);

            // Create learning record
            const learningContent = `---
            date: "${date}"
            tags: [auto-dev, success, pr-${pr.number}]
            task: "${pr.title.replace(/"/g, '\\"')}"
            status: resolved
            pr: ${pr.number}
            ---

            # ${pr.title}

            ## Context
            Task completed via Auto-Dev

            ## PR description
            ${pr.body || 'No description'}

            ## Outcome
            ✅ Merged successfully

            ## Files changed
            ${pr.changed_files} file(s)

            ## Notes
            This task completed successfully; use as a reference for similar work.
            `;

            const filePath = `.claude/memory/learnings/${date}-${slug}.md`;

            // Ensure directory exists
            const dir = '.claude/memory/learnings';
            if (!fs.existsSync(dir)) {
              fs.mkdirSync(dir, { recursive: true });
            }

            fs.writeFileSync(filePath, learningContent);
            console.log(`Created learning record: ${filePath}`);

      - name: Commit memory update
        run: |
          git config user.name "Auto-Dev Bot"
          git config user.email "auto-dev-bot@users.noreply.github.com"

          git add .claude/memory/
          if ! git diff --cached --quiet; then
            git commit -m "docs: Record successful auto-dev experience

          PR: #${{ github.event.pull_request.number }}

          🤖 Memory updated by Auto-Dev Bot"
            git push
          fi

  # =========================================================================
  # PR closed without merge: record failure
  # =========================================================================
  handle-pr-closed:
    name: 📝 Record Failure
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false &&
      contains(github.event.pull_request.labels.*.name, '🤖 auto-dev')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Record failure to memory
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const date = new Date().toISOString().split('T')[0];
            const slug = pr.title.toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .substring(0, 50);

            // Load PR comments for rejection context
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const rejectionComments = comments
              .filter(c => !c.user.login.includes('bot'))
              .map(c => `- ${c.user.login}: ${c.body.substring(0, 200)}`)
              .join('\n');

            // Create failure record
            const failureContent = `---
            date: "${date}"
            tags: [auto-dev, failure, pr-${pr.number}]
            task: "${pr.title.replace(/"/g, '\\"')}"
            status: rejected
            pr: ${pr.number}
            ---

            # ${pr.title}

            ## Context
            Auto-Dev task where the PR was not merged

            ## PR description
            ${pr.body || 'No description'}

            ## Outcome
            ❌ PR closed without merge

            ## Reviewer feedback
            ${rejectionComments || 'No clear feedback'}

            ## Lessons
            - Analyze why this task did not land
            - Watch for similar pitfalls on future tasks

            ## Follow-ups
            - [ ] Root-cause analysis
            - [ ] Update strategy to avoid repeat issues
            `;

            const filePath = `.claude/memory/failures/${date}-${slug}.md`;

            // Ensure directory exists
            const dir = '.claude/memory/failures';
            if (!fs.existsSync(dir)) {
              fs.mkdirSync(dir, { recursive: true });
            }

            fs.writeFileSync(filePath, failureContent);
            console.log(`Created failure record: ${filePath}`);

      - name: Commit memory update
        run: |
          git config user.name "Auto-Dev Bot"
          git config user.email "auto-dev-bot@users.noreply.github.com"

          git add .claude/memory/
          if ! git diff --cached --quiet; then
            git commit -m "docs: Record failed auto-dev experience

          PR: #${{ github.event.pull_request.number }} (closed without merge)

          🤖 Memory updated by Auto-Dev Bot"
            git push
          fi
