# ============================================================================
# Auto-Dev Task Queue
# ============================================================================
# Manage multiple pending goals:
#   - Hourly check for pending auto-dev issues
#   - Run by priority order
#   - Avoid running too many tasks at once
# ============================================================================

name: 📋 Auto-Dev Queue

on:
  # Scheduled
  schedule:
    - cron: '0 * * * *'  # Hourly

  # Manual
  workflow_dispatch:
    inputs:
      process_count:
        description: 'How many tasks to process'
        required: false
        type: number
        default: 1

jobs:
  # =========================================================================
  # Check and process the task queue
  # =========================================================================
  process-queue:
    name: 📋 Process Queue
    runs-on: ubuntu-latest

    steps:
      - name: Check queue and trigger tasks
        uses: actions/github-script@v7
        with:
          script: |
            const processCount = ${{ github.event.inputs.process_count || 1 }};

            // Find open issues with auto-dev label and no linked PR yet
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'auto-dev',
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 20
            });

            console.log(`Found ${issues.length} open auto-dev issues`);

            // Filter out issues that already have a PR
            const pendingIssues = [];
            for (const issue of issues) {
              // Check for linked PR
              const { data: events } = await github.rest.issues.listEvents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              const hasLinkedPR = events.some(e =>
                e.event === 'cross-referenced' &&
                e.source?.issue?.pull_request
              );

              // Check for processing label
              const isProcessing = issue.labels.some(l =>
                l.name === 'processing' || l.name === '⏳ processing'
              );

              if (!hasLinkedPR && !isProcessing) {
                pendingIssues.push(issue);
              }
            }

            console.log(`${pendingIssues.length} issues pending processing`);

            // Sort by priority
            const priorityOrder = { 'priority:high': 0, 'priority:normal': 1, 'priority:low': 2 };
            pendingIssues.sort((a, b) => {
              const aPriority = a.labels.find(l => l.name.startsWith('priority:'))?.name || 'priority:normal';
              const bPriority = b.labels.find(l => l.name.startsWith('priority:'))?.name || 'priority:normal';
              return (priorityOrder[aPriority] || 1) - (priorityOrder[bPriority] || 1);
            });

            // Process first N
            const toProcess = pendingIssues.slice(0, processCount);

            for (const issue of toProcess) {
              console.log(`Triggering auto-dev for issue #${issue.number}: ${issue.title}`);

              // Add processing label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['⏳ processing']
              });

              // Trigger auto-dev workflow
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'auto-dev.yml',
                ref: 'main',
                inputs: {
                  goal: `Issue #${issue.number}: ${issue.title}\n\n${issue.body || ''}`,
                  priority: issue.labels.find(l => l.name.startsWith('priority:'))?.name.split(':')[1] || 'normal'
                }
              });
            }

            // Log summary
            const summary = `
            ## 📋 Auto-Dev queue processed

            - Pending total: ${pendingIssues.length}
            - Processed this run: ${toProcess.length}
            - Still pending: ${pendingIssues.length - toProcess.length}

            ### Processed this run
            ${toProcess.map(i => `- #${i.number}: ${i.title}`).join('\n') || 'None'}

            ### Remaining queue
            ${pendingIssues.slice(processCount).map(i => `- #${i.number}: ${i.title}`).join('\n') || 'None'}
            `;

            console.log(summary);
