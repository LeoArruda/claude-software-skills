# ============================================================================
# Auto Development Workflow
# ============================================================================
# Triggers:
#   1. Issue labeled "auto-dev"
#   2. Issue/PR comment with "/evolve"
#   3. Manual workflow_dispatch
#
# Flow:
#   Issue/Command → Claude Code + Evolve → PR → human review → memory updates
# ============================================================================

name: 🤖 Auto Development

on:
  # Trigger 1: Issue label
  issues:
    types: [labeled]

  # Trigger 2: Issue/PR comment command
  issue_comment:
    types: [created]

  # Trigger 3: Manual dispatch
  workflow_dispatch:
    inputs:
      goal:
        description: 'Development goal'
        required: true
        type: string
      priority:
        description: 'Priority'
        required: false
        type: choice
        options:
          - normal
          - high
          - low
        default: normal
      max_iterations:
        description: 'Maximum iterations'
        required: false
        type: number
        default: 10

# Only one auto-dev run at a time per issue/run
concurrency:
  group: auto-dev-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  NODE_ENV: production

jobs:
  # =========================================================================
  # Job 1: Parse trigger
  # =========================================================================
  parse-trigger:
    name: 📋 Parse Trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      goal: ${{ steps.check.outputs.goal }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      trigger_type: ${{ steps.check.outputs.trigger_type }}
      priority: ${{ steps.check.outputs.priority }}
      max_iterations: ${{ steps.check.outputs.max_iterations }}

    steps:
      - name: Check trigger conditions
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            let shouldRun = false;
            let goal = '';
            let issueNumber = null;
            let triggerType = '';
            let priority = 'normal';
            let maxIterations = 10;

            // Case 1: Issue labeled with "auto-dev"
            if (event === 'issues' && context.payload.action === 'labeled') {
              const label = context.payload.label.name;
              if (label === 'auto-dev' || label === '🤖 auto-dev') {
                shouldRun = true;
                goal = context.payload.issue.title + '\n\n' + context.payload.issue.body;
                issueNumber = context.payload.issue.number;
                triggerType = 'issue_label';

                // Check for priority labels
                const labels = context.payload.issue.labels.map(l => l.name);
                if (labels.includes('priority:high')) priority = 'high';
                if (labels.includes('priority:low')) priority = 'low';
              }
            }

            // Case 2: Comment with /evolve command
            if (event === 'issue_comment' && context.payload.action === 'created') {
              const comment = context.payload.comment.body;
              const evolveMatch = comment.match(/^\/evolve\s+(.+)/s);

              if (evolveMatch) {
                shouldRun = true;
                goal = evolveMatch[1].trim();
                issueNumber = context.payload.issue.number;
                triggerType = 'comment_command';

                // Optional parameters
                const priorityMatch = comment.match(/--priority[=\s]+(\w+)/);
                if (priorityMatch) priority = priorityMatch[1];

                const iterMatch = comment.match(/--max-iterations[=\s]+(\d+)/);
                if (iterMatch) maxIterations = parseInt(iterMatch[1]);
              }
            }

            // Case 3: Manual dispatch
            if (event === 'workflow_dispatch') {
              shouldRun = true;
              goal = context.payload.inputs.goal;
              triggerType = 'manual';
              priority = context.payload.inputs.priority || 'normal';
              maxIterations = parseInt(context.payload.inputs.max_iterations) || 10;
            }

            core.setOutput('should_run', shouldRun);
            core.setOutput('goal', goal);
            core.setOutput('issue_number', issueNumber);
            core.setOutput('trigger_type', triggerType);
            core.setOutput('priority', priority);
            core.setOutput('max_iterations', maxIterations);

            console.log(`Trigger: ${triggerType}, Should Run: ${shouldRun}`);
            if (goal) console.log(`Goal: ${goal.substring(0, 100)}...`);

  # =========================================================================
  # Job 2: Run auto development
  # =========================================================================
  evolve:
    name: 🧬 Evolve
    needs: parse-trigger
    if: needs.parse-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Max 1 hour

    outputs:
      branch_name: ${{ steps.setup.outputs.branch_name }}
      has_changes: ${{ steps.check-changes.outputs.has_changes }}
      summary: ${{ steps.evolve.outputs.summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup environment
        id: setup
        run: |
          # Branch name
          ISSUE_NUM="${{ needs.parse-trigger.outputs.issue_number }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)

          if [ -n "$ISSUE_NUM" ]; then
            BRANCH_NAME="auto-dev/issue-${ISSUE_NUM}-${TIMESTAMP}"
          else
            BRANCH_NAME="auto-dev/manual-${TIMESTAMP}"
          fi

          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          # Create and switch branch
          git checkout -b "$BRANCH_NAME"

          # Git user for commits
          git config user.name "Auto-Dev Bot"
          git config user.email "auto-dev-bot@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Initialize memory system
        run: |
          # Ensure memory directories exist
          mkdir -p .claude/memory/{learnings,failures,decisions,patterns,strategies}

          # Seed index.md if missing
          if [ ! -f .claude/memory/index.md ]; then
            cat > .claude/memory/index.md << 'EOF'
          # Project memory index

          > Auto-maintained; avoid editing the main marker blocks by hand

          ## Recent learnings
          <!-- LEARNINGS_START -->
          <!-- LEARNINGS_END -->

          ## Important decisions
          <!-- DECISIONS_START -->
          <!-- DECISIONS_END -->

          ## Failures
          <!-- FAILURES_START -->
          <!-- FAILURES_END -->

          ## Patterns
          <!-- PATTERNS_START -->
          <!-- PATTERNS_END -->

          ## Tag index
          <!-- TAGS_START -->
          <!-- TAGS_END -->
          EOF
          fi

      - name: Post start notification
        if: needs.parse-trigger.outputs.issue_number
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.parse-trigger.outputs.issue_number }};
            const branchName = '${{ steps.setup.outputs.branch_name }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## 🤖 Auto-Dev started

            | Field | Value |
            |------|-----|
            | Branch | \`${branchName}\` |
            | Priority | ${{ needs.parse-trigger.outputs.priority }} |
            | Max iterations | ${{ needs.parse-trigger.outputs.max_iterations }} |
            | Run log | [View Action](${runUrl}) |

            ⏳ Running; a PR will be opened when complete...`
            });

      - name: Run Claude Code with Evolve
        id: evolve
        env:
          GOAL: ${{ needs.parse-trigger.outputs.goal }}
          MAX_ITERATIONS: ${{ needs.parse-trigger.outputs.max_iterations }}
          ISSUE_NUMBER: ${{ needs.parse-trigger.outputs.issue_number }}
        run: |
          # Execution log path
          EXECUTION_LOG=".claude/memory/executions/$(date +%Y%m%d-%H%M%S).md"
          mkdir -p .claude/memory/executions

          # Run Claude Code
          # --dangerously-skip-permissions: required in CI
          # --max-turns: cap conversation turns
          # --output-format: structured output
          claude --dangerously-skip-permissions \
                 --max-turns 50 \
                 --output-format json \
                 "/evolve $GOAL" 2>&1 | tee execution.log

          # Extract run summary
          SUMMARY=$(tail -50 execution.log | head -20)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: check-changes
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Commit changes
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          ISSUE_NUM="${{ needs.parse-trigger.outputs.issue_number }}"

          # Commit message
          if [ -n "$ISSUE_NUM" ]; then
            COMMIT_MSG="feat: Auto-dev for issue #${ISSUE_NUM}

          Goal: $(echo '${{ needs.parse-trigger.outputs.goal }}' | head -1)

          🤖 Generated by Auto-Dev Bot
          See: #${ISSUE_NUM}"
          else
            COMMIT_MSG="feat: Auto-dev execution

          Goal: $(echo '${{ needs.parse-trigger.outputs.goal }}' | head -1)

          🤖 Generated by Auto-Dev Bot"
          fi

          git commit -m "$COMMIT_MSG"
          git push origin "${{ steps.setup.outputs.branch_name }}"

  # =========================================================================
  # Job 3: Create pull request
  # =========================================================================
  create-pr:
    name: 📝 Create PR
    needs: [parse-trigger, evolve]
    if: needs.evolve.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
      pr_url: ${{ steps.create-pr.outputs.pr_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.evolve.outputs.branch_name }}

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.parse-trigger.outputs.issue_number || 'null' }};
            const branchName = '${{ needs.evolve.outputs.branch_name }}';
            const goal = `${{ needs.parse-trigger.outputs.goal }}`.substring(0, 200);

            // PR title
            let title = '🤖 Auto-Dev: ';
            if (issueNumber) {
              title += `#${issueNumber} - ${goal.split('\n')[0]}`;
            } else {
              title += goal.split('\n')[0];
            }

            // PR body
            let body = `## 🤖 Auto-Dev Pull Request

            ### Goal
            ${goal}

            ### Run summary
            \`\`\`
            ${{ needs.evolve.outputs.summary }}
            \`\`\`

            ### Review checklist
            - [ ] Code quality
            - [ ] Test coverage
            - [ ] Security review
            - [ ] Docs updated if needed

            ### After review
            - ✅ **Merge**: merge as usual
            - ✏️ **Changes needed**: comment with \`/evolve [what to change]\` to continue
            - ➕ **New scope**: open a new issue with the \`auto-dev\` label
            - ❌ **Reject**: close the PR and explain why

            ---
            `;

            if (issueNumber) {
              body += `\nCloses #${issueNumber}`;
            }

            body += `\n\n🤖 Generated by [Auto-Dev Bot]`;

            // Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title.substring(0, 256),
              body: body,
              head: branchName,
              base: 'main',
              draft: false
            });

            console.log(`Created PR #${pr.number}: ${pr.html_url}`);

            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['🤖 auto-dev', 'needs-review']
            });

            // If linked to an issue, comment there
            if (issueNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `## ✅ Auto-Dev complete!

            PR opened: #${pr.number}

            Next steps:
            - ✅ Merge the PR
            - ✏️ Comment to adjust the goal
            - ❌ Close and explain why`
              });
            }

            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);

  # =========================================================================
  # Job 4: Notify when there are no changes
  # =========================================================================
  notify-no-changes:
    name: 📢 Notify No Changes
    needs: [parse-trigger, evolve]
    if: needs.evolve.outputs.has_changes == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: Post no-changes notification
        if: needs.parse-trigger.outputs.issue_number
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.parse-trigger.outputs.issue_number }};

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## ⚠️ Auto-Dev finished with no changes

            The run completed but produced no code changes.

            Possible reasons:
            - The goal was already satisfied
            - The goal was too vague
            - A blocker prevented automated fixes

            ### Run summary
            \`\`\`
            ${{ needs.evolve.outputs.summary }}
            \`\`\`

            Refine the goal and retry, or run \`/evolve [clearer goal]\` again.`
            });
